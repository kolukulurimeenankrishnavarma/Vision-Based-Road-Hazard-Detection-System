<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadGuard Admin Dashboard</title>
    <!-- Use Google Fonts (Outfit) as requested in system instructions for web apps -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --primary: #2f81f7;
            --danger: #f85149;
            --success: #238636;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px 40px;
            box-sizing: border-box;
            min-height: 100vh;
        }
        h1 {
            color: #ffffff;
            margin-bottom: 5px;
            font-size: 2em;
            font-weight: 600;
        }
        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        h2 {
            color: #ffffff;
            margin: 0 0 15px 0;
            font-size: 1.3em;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }
        th, td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.05em;
        }
        tbody tr:hover {
            background-color: rgba(255,255,255,0.02);
        }
        button, .btn {
            background: var(--primary);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9em;
        }
        button:hover, .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-danger {
            background: var(--danger);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }
        .btn-outline:hover {
            border-color: var(--text-muted);
            background: rgba(255,255,255,0.05);
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-active { background: rgba(248, 81, 73, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        .status-resolved { background: rgba(35, 134, 54, 0.2); color: var(--success); border: 1px solid var(--success); }
        .status-inactive { background: rgba(139, 148, 158, 0.2); color: var(--text-muted); border: 1px solid var(--text-muted); }
        
        .action-cell {
            display: flex;
            gap: 8px;
        }

        /* Login Screen */
        #login-section {
            max-width: 400px;
            margin: 100px auto;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: white;
            font-family: 'Outfit', sans-serif;
            box-sizing: border-box;
            font-size: 1em;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        #login-btn {
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            margin-top: 10px;
        }

    </style>
</head>
<body>
    <div id="login-section" class="panel">
        <h2 style="justify-content: center; font-size: 1.5em; margin-bottom: 25px;">🛡️ Admin Login</h2>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="login-username" placeholder="admin">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button id="login-btn">Secure Login</button>
        <p id="login-error" style="color: var(--danger); display: none; margin-top: 15px; text-align: center;"></p>
    </div>

    <div id="dashboard-section" style="display: none;">
        <div style="max-width: 1400px; margin: 0 auto;">
            <h1>🛡️ RoadGuard Admin</h1>
            <div class="subtitle">Real-time Pothole Detection & Location Management</div>
            
            <div class="container">
                
                <!-- Potholes Panel -->
                <div class="panel">
                    <h2>
                        Detected Potholes
                        <button id="export-csv-btn" class="btn">Download CSV</button>
                    </h2>
                    <div class="table-responsive">
                        <table id="hazards-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Photo</th>
                                    <th>Type</th>
                                    <th>Confidence</th>
                                    <th>Coordinates (Lat, Lng)</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>


            </div>
        </div>
    </div>


    <script src="admin.js"></script>
</body>
</html>
